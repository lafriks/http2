version: "2"

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - unused
    - ineffassign
    - unconvert
    - durationcheck
    - misspell
    - gocritic
  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow
    misspell:
      locale: US
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - rangeValCopy
        - hugeParam
        - ifElseChain
        - appendAssign
  exclusions:
    rules:
      # the []byte pools are deliberate; boxing them behind pointers isn't
      # worth the churn
      - linters:
          - staticcheck
        text: 'SA6002: argument should be pointer-like to avoid allocations'

formatters:
  enable:
    - gofmt

run:
  timeout: 5m
