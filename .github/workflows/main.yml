name: Main

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  main:
    name: Main Process
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check dependencies are tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Check formatting
        run: |
          fmt=$(gofmt -s -l .)
          if [ -n "$fmt" ]; then
            echo "files are not gofmt'ed:"
            echo "$fmt"
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.4
